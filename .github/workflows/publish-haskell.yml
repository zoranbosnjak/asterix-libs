name: upload-haskell

on:
  workflow_dispatch: {}
  schedule:
    - cron: '0 3 * * 0'

permissions:
  contents: read

jobs:
  check-versions:
    runs-on: ubuntu-latest

    outputs:
      update: ${{ steps.check.outputs.update }}

    steps:
      - uses: actions/checkout@v4

      - name: Check versions
        id: check
        run: |
            v1=$(curl -s -H "Accept: application/json" https://hackage.haskell.org/package/libasterix | jq -r 'keys_unsorted | last')
            echo "Published version: $v1"

            v2=$(cat libs/haskell/libasterix.cabal | grep "^version" | sed -e 's/version:\s*//')
            echo "Current version: $v2"

            if [ "$v1" != "$v2" ]; then
                echo "update=proceed" | tee -a "$GITHUB_OUTPUT";
            else
                echo "update=skip" | tee -a "$GITHUB_OUTPUT";
            fi

  publish:
    if: ${{ needs.check-versions.outputs.update == 'proceed' }}
    runs-on: ubuntu-latest
    needs:
      - check-versions
    steps:
      - uses: actions/checkout@v4
      - run: |
          cd libs/haskell
          cabal check
          cabal sdist
          cabal update
          cabal haddock --haddock-for-hackage --enable-documentation
      - uses: haskell-actions/hackage-publish@v1.1
        with:
          hackageToken: ${{ secrets.HACKAGE_AUTH_TOKEN }}
          publish: true
          packagesPath: libs/haskell/dist-newstyle/sdist/
          docsPath: libs/haskell/dist-newstyle

